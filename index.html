<script>
    //var buildUrl = "Build";
    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/geometry-world.loader.js";
    var config = {
        dataUrl: buildUrl + "/geometry-world.data.unityweb",
        frameworkUrl: buildUrl + "/geometry-world.framework.js.unityweb",
        codeUrl: buildUrl + "/geometry-world.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Marty Games",
        productName: "Geometry World",
        productVersion: "2.9",
    };

    var progressElement = document.getElementById('progress_fill');
    var container = document.getElementById("unity-container");
    var canvas = document.getElementById("unity-canvas");
    var loadingBar = document.querySelector("#loadingBlock");
    var progressBarFull = document.querySelector("#progress_fill");
    var progress_text = document.querySelector(".gameloader-progress-info");
    let text_percent = "";




    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressElement.style.width = 100 * progress + "%";
            text_percent = "Downloading file: " + Math.round(progress * 100) + "%";
            progress_text.innerText = text_percent;
            if (progress >= 99) {
                progress_text.innerText = "Loading Game...";
            }
        }).then((unityInstance) => {
            window.unityInstance = unityInstance;
            setTimeout(function() {
                loadingBar.style.display = "none";
            }, 2000);
            container.style.display = "block";
        }).catch((message) => {
            alert(message);
        });
    };
    document.body.appendChild(script);
</script>
